apis:
  - aid: tripetto:tripetto-form-builder-sdk
    name: Tripetto FormBuilder SDK
    description: >-
      The Tripetto FormBuilder SDK provides JavaScript and TypeScript APIs for embedding
      interactive form builders into web applications. Supports React, Angular, and plain
      JavaScript integration with a rich component model for building, running, and
      collecting responses from smart conversational forms.
    humanURL: https://tripetto.com/sdk/
    baseURL: https://tripetto.com
    tags:
      - Forms
      - SDK
      - JavaScript
      - TypeScript
      - React
      - Angular
    properties:
      - type: Documentation
        url: https://tripetto.com/sdk/docs/
      - type: Builder API Reference
        url: https://tripetto.com/sdk/docs/builder/api/
      - type: Getting Started
        url: https://tripetto.com/sdk/docs/builder/introduction/
      - type: npm Package
        url: https://www.npmjs.com/package/@tripetto/builder
      - type: OpenAPI
        url: openapi/tripetto-form-builder-openapi.yml
      - type: JSONSchema
        url: json-schema/tripetto-form-schema.json
      - type: JSONSchema
        url: json-schema/tripetto-response-schema.json

  - aid: tripetto:tripetto-webhooks
    name: Tripetto Webhooks
    description: >-
      Tripetto supports outbound webhooks that deliver form response data to external
      services and automation platforms including Make, Zapier, and Pabbly Connect.
      Custom webhook endpoints receive form submission payloads as HTTP POST requests
      with structured JSON response data.
    humanURL: https://tripetto.com/help/articles/how-to-automate-a-webhook-to-connect-to-other-services-for-each-new-result/
    baseURL: https://tripetto.com
    tags:
      - Webhooks
      - Automation
      - Forms
      - Integrations
    properties:
      - type: Documentation
        url: https://tripetto.com/help/articles/how-to-automate-a-webhook-to-connect-to-other-services-for-each-new-result/
