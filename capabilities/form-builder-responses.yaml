naftiko: 1.0.0-alpha2
info:
  label: Tripetto FormBuilder SDK API — Responses
  description: 'Tripetto FormBuilder SDK API — Responses. 2 operations. Lead operation: List Form Responses. Self-contained
    Naftiko capability covering one Tripetto business surface.'
  tags:
  - Tripetto
  - Responses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRIPETTO_API_KEY: TRIPETTO_API_KEY
capability:
  consumes:
  - type: http
    namespace: form-builder-responses
    baseUri: https://tripetto.com
    description: Tripetto FormBuilder SDK API — Responses business capability. Self-contained, no shared references.
    resources:
    - name: app-api-forms-formId-responses
      path: /app/api/forms/{formId}/responses
      operations:
      - name: listformresponses
        method: GET
        description: List Form Responses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: limit
          in: query
          type: integer
          description: Number of responses per page
        - name: from
          in: query
          type: string
          description: Filter responses from this ISO 8601 date
        - name: to
          in: query
          type: string
          description: Filter responses to this ISO 8601 date
    - name: app-api-forms-formId-responses-responseId
      path: /app/api/forms/{formId}/responses/{responseId}
      operations:
      - name: getformresponse
        method: GET
        description: Get Form Response
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: responseId
          in: path
          type: string
          description: The unique identifier of the form response
          required: true
    authentication:
      type: bearer
      token: '{{env.TRIPETTO_API_KEY}}'
  exposes:
  - type: rest
    namespace: form-builder-responses-rest
    port: 8080
    description: REST adapter for Tripetto FormBuilder SDK API — Responses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/app/api/forms/{formid}/responses
      name: app-api-forms-formid-responses
      description: REST surface for app-api-forms-formId-responses.
      operations:
      - method: GET
        name: listformresponses
        description: List Form Responses
        call: form-builder-responses.listformresponses
        with:
          page: rest.page
          limit: rest.limit
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/app/api/forms/{formid}/responses/{responseid}
      name: app-api-forms-formid-responses-responseid
      description: REST surface for app-api-forms-formId-responses-responseId.
      operations:
      - method: GET
        name: getformresponse
        description: Get Form Response
        call: form-builder-responses.getformresponse
        with:
          responseId: rest.responseId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: form-builder-responses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tripetto FormBuilder SDK API — Responses. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-form-responses
      description: List Form Responses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: form-builder-responses.listformresponses
      with:
        page: tools.page
        limit: tools.limit
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
    - name: get-form-response
      description: Get Form Response
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: form-builder-responses.getformresponse
      with:
        responseId: tools.responseId
      outputParameters:
      - type: object
        mapping: $.
